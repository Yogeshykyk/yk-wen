<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#d30ca1;
color:white;
overflow-x:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100vh;
background:linear-gradient(45deg,#ff0066,#7928ca,#00ffff);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
animation:introFade 3s forwards 3s;
}

#intro h1{
font-size:30px;
text-align:center;
}

@keyframes introFade{
to{opacity:0;visibility:hidden;}
}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.hero-overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.hero-content h1{
font-size:32px;
}

.hero-content p{
font-size:16px;
}
.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}
/* SECTION */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.section h2{
font-size:26px;
margin-bottom:10px;
}

.section p{
font-size:15px;
}

<!-- MUSIC BUTTON -->
<button id="musicBtn" onclick="toggleMusic()">🎵 Music</button>
<audio id="music" loop>
<source src="c:\Users\ts672\Downloads\WhatsApp Video 2026-04-01 at 7.46.35 PM.mp4" type="audio/mpeg">
</audio>

/* PROFILE PHOTO */
.profile-photo{
width:200px;
height:200px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
margin-top:20px;
}

/* SIDE PHOTOS */
.photo{
width:120px;
height:120px;
border:3px solid #1cdb0a;
position:relative;
margin:10px;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.photo-container{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

/* MUSIC BUTTON */
#musicBtn{
position:fixed;
top:10px;
right:10px;
padding:8px 12px;
background:#ff0066;
border:none;
border-radius:20px;
color:white;
font-size:12px;
z-index:1000;
}

/* LAST PAGE */
.last-page{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.last-page video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(60%);
}

.last-page h2{
font-size:28px;
}
/* =====================================================
   FLOWERS
===================================================== */
.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}


/* HEARTS */
.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:rise linear infinite;
}

@keyframes rise{
to{transform:translateY(-110vh);}
}
</style>
</head>

<body>


<!-- INTRO -->
<div id="intro">
<h1>🎉 Birthday Surprise 🎉</h1>
</div>

<!-- HERO -->
<div class="hero">
<video autoplay muted loop>
<source src="c:\Users\ts672\Downloads\WhatsApp Video 2026-04-01 at 7.46.35 PM.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-content">
<h1>Happy Birthday 💖</h1>
<p>Welcome to your surprise ✨</p>
</div>
</div>

<!-- SECTION 1 -->
<div class="section">
<h2>You Are My Forever Friend 💕</h2>
<p>Thank you for every memory.</p>
<img src="C:\Users\ts672\Downloads\center.png" class="profile-photo">
</div>

<!-- SECTION 2 -->
<div class="section">
<h2>Our Memories 💫</h2>
<p>Life is beautiful with you.</p>

<div class="photo-container">
<div class="photo"><img src="C:\Users\ts672\Downloads\left.png"></div>
<div class="photo"><img src="c:\Users\ts672\Downloads\right.png"></div>
</div>
</div>

<!-- LAST PAGE -->
<div class="last-page">
<video autoplay muted loop>
<source src="video2.mp4" type="video/mp4">
</video>

<h2>Thanks For Everything 💖</h2>
</div>

<script>
/* MUSIC */
function toggleMusic(){
let music=document.getElementById("music");
music.paused ? music.play() : music.pause();


}
for(let i=0;i<200;i++){
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(5+Math.random()*10)+"s";
flower.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(flower);
}
/* HEARTS */
for(let i=0;i<40;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);
}
</script>

</body>
</html>
